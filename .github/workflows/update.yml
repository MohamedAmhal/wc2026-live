name: Mise à jour live + déploiement

# Rafraîchit les données (native-stats, sans Cloudflare) et publie la PWA.
# Déploie-sans-committer : pas de commit à chaque run (historique git propre),
# les données fraîches partent directement sur GitHub Pages.
on:
  schedule:
    - cron: "*/5 * * * *"      # toutes les 5 minutes (minimum autorisé par GitHub)
  workflow_dispatch: {}         # bouton « Run workflow » manuel

permissions:
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Dépendances minimales pour le mode --live (pas de SeleniumBase/Cloudflare).
      - run: pip install selenium beautifulsoup4 lxml

      # Met à jour scores + classement depuis native-stats et régénère data.json.
      # (la base committée fournit groupes/équipes/stats joueurs ; non re-committée)
      - name: Scrape live (native-stats) + export JSON
        run: python run.py --live --headless

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: webapp

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.dep.outputs.page_url }}
    steps:
      - id: dep
        uses: actions/deploy-pages@v4
